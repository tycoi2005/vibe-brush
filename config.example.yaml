# Open Brush AI Sculptor — Configuration
# Copy this file to config.yaml and fill in your values.

# LLM Settings (OpenAI-compatible API)
llm:
  api_key: "sk-your-api-key-here"          # or set OPENAI_API_KEY env var
  base_url: "https://api.openai.com/v1"    # or any OpenAI-compatible endpoint
  model: "gpt-4o"                           # model name
  temperature: 0.7                          # creativity (0.0 = precise, 1.0 = creative)
  max_tokens: 4096                          # max response tokens

# Open Brush Connection
openbrush:
  host: "localhost"
  port: 40074
  command_delay: 0.05    # seconds between API calls (prevent overwhelming OB)

# Export Settings
export:
  auto_save: true        # auto-save sketch after each creation
  auto_export: false     # auto-export to glb after each creation
